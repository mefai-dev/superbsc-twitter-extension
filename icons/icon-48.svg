<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg48" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2128"/>
      <stop offset="100%" stop-color="#0b0e11"/>
    </linearGradient>
    <linearGradient id="gold48" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="30%" stop-color="#f0b90b"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="gold48s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b90b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0b90b" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow48">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#f0b90b" flood-opacity="0.3"/>
    </filter>
    <filter id="inner48">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#ffe082" flood-opacity="0.4"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background with depth -->
  <rect width="48" height="48" rx="10" fill="url(#bg48)"/>
  <rect x="1" y="1" width="46" height="46" rx="9" fill="none" stroke="url(#gold48s)" stroke-width="1"/>
  <!-- 3D S letter with depth -->
  <g filter="url(#shadow48)">
    <!-- Shadow layer (back) -->
    <path d="M30 15 C30 12, 27 10, 24 10 C20 10, 17 12, 17 15 C17 18, 19 19.5, 24 21 C29 22.5, 31 24, 31 27 C31 31, 28 34, 24 34 C20 34, 17 31, 17 28" fill="none" stroke="#8a6d0b" stroke-width="5" stroke-linecap="round" transform="translate(0.5, 1)"/>
    <!-- Main S stroke -->
    <path d="M30 15 C30 12, 27 10, 24 10 C20 10, 17 12, 17 15 C17 18, 19 19.5, 24 21 C29 22.5, 31 24, 31 27 C31 31, 28 34, 24 34 C20 34, 17 31, 17 28" fill="none" stroke="url(#gold48)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Highlight stroke (top) -->
    <path d="M30 15 C30 12, 27 10, 24 10 C20 10, 17 12, 17 15 C17 18, 19 19.5, 24 21" fill="none" stroke="#ffe082" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  </g>
  <!-- Corner accent dots -->
  <circle cx="10" cy="10" r="1.5" fill="#f0b90b" opacity="0.4"/>
  <circle cx="38" cy="38" r="1.5" fill="#f0b90b" opacity="0.4"/>
</svg>